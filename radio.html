<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎧 今日精神状态 · 极简氛围电台</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; margin: 0; display: flex; justify-content: center; align-items: center; 
            background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #ededed;
        }
        
        /* 极简雾面容器 */
        .container { 
            width: 95%; max-width: 500px; background: #121212; padding: 35px 25px; 
            border-radius: 24px; box-shadow: 0 30px 70px rgba(0,0,0,0.8); text-align: center;
            border: 1px solid #222222;
        }
        
        h1 { font-size: 20px; font-weight: 600; margin: 0 0 6px 0; color: #ffffff; letter-spacing: 2px; }
        .subtitle { color: #666666; font-size: 11px; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* AI 输入区 - 极简白描风 */
        .ai-input-zone { margin-bottom: 25px; background: #161616; padding: 12px; border-radius: 16px; border: 1px solid #222222; }
        .ai-input-zone textarea { 
            width: 100%; height: 50px; background: #0a0a0a; border: 1px solid #222222; 
            border-radius: 10px; color: #ffffff; padding: 10px; font-size: 13px; resize: none; outline: none; transition: border 0.3s;
        }
        .ai-input-zone textarea:focus { border-color: #555555; }
        .ai-btn { 
            width: 100%; margin-top: 8px; padding: 10px; border: 1px solid #333333; border-radius: 8px; 
            background: #ffffff; color: #000000; font-weight: 600; cursor: pointer; font-size: 12px; transition: all 0.2s;
        }
        .ai-btn:hover { background: #e5e5e5; }

        /* 10轨双列网格布局 */
        .mixer-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            text-align: left; margin-bottom: 25px; max-height: 300px; overflow-y: auto; padding-right: 4px;
        }
        /* 美化滚动条 */
        .mixer-grid::-webkit-scrollbar { width: 4px; }
        .mixer-grid::-webkit-scrollbar-thumb { background: #222222; border-radius: 2px; }
        
        .track { background: #161616; padding: 14px 12px; border-radius: 14px; border: 1px solid #222222; }
        .track-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; color: #888888; }
        .track-label span:first-child { color: #aaaaaa; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .track-percent { color: #ffffff; font-weight: bold; text-shadow: 0 0 4px rgba(255,255,255,0.2); }
        
        /* 极简黑白滑块 */
        input[type=range] { width: 100%; -webkit-appearance: none; background: #222222; height: 3px; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; 
            background: #ffffff; cursor: pointer; border: 1px solid #000000; transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        /* 底部生成按钮 */
        .gen-btn {
            width: 100%; padding: 14px; border: 1px solid #333333; border-radius: 12px; 
            background: transparent; color: #ffffff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .gen-btn:hover { background: #ffffff; color: #000000; }
        
        /* 诊断卡片 */
        .card { margin-top: 20px; background: #161616; padding: 18px; border-radius: 14px; display: none; text-align: left; border: 1px dashed #333333; }
        .card h3 { margin: 0; color: #ffffff; font-size: 15px; font-weight: 600; }
        .card p { font-size: 12px; color: #888888; line-height: 1.6; margin: 8px 0 0 0; }
        .tags-container { margin-top: 12px; }
        .tag { display: inline-block; background: #0a0a0a; color: #aaaaaa; padding: 3px 8px; border-radius: 4px; font-size: 10px; margin: 2px; border: 1px solid #222222; }
    </style>
</head>
<body>

<div class="container">
    <h1>今日精神状态电台</h1>
    <div class="subtitle">INPUT TEXT OR ADJUST TRACKS TO COMPOSE YOUR SOUNDS</div>

    <div class="ai-input-zone">
        <textarea id="ai-text" placeholder="用一句话吐槽现状（例如：方案又被退回了急 / 蝉鸣好夏天想放假 / 咖啡续命画图中...）"></textarea>
        <button class="ai-btn" onclick="matchAIStatus()">🔮 AI 智能一键混音</button>
    </div>

    <div class="mixer-grid">
