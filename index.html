<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 16型动物塑人格深度测评</title>
    <!-- 引入 Chart.js 用于绘制最终的结果饼状图 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; margin: 0; display: flex; justify-content: center; align-items: center; 
            background: #f1f5f9; font-family: -apple-system, sans-serif; color: #334155;
        }
        .container { 
            width: 95%; max-width: 550px; background: white; padding: 35px 25px; 
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center;
        }
        h2 { color: #1e293b; font-size: 22px; margin-bottom: 20px; }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 6px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: #6366f1; width: 0%; transition: width 0.3s; }
        .option-group { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { 
            padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; 
            cursor: pointer; font-size: 15px; font-weight: 500; color: #475569; transition: all 0.2s;
        }
        .opt-btn:hover { background: #f4f5ff; border-color: #6366f1; color: #6366f1; }
        .result-icon { font-size: 65px; margin-bottom: 10px; }
        .result-name { font-size: 26px; color: #6366f1; font-weight: bold; margin-bottom: 15px; }
        .result-box { text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; font-size: 14px; line-height: 1.7; }
        .chart-box { max-width: 280px; margin: 20px auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- 答题页 -->
    <div id="quiz-section">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <h2 id="q-text">测评加载中...</h2>
        <div class="option-group">
            <button class="opt-btn" onclick="answer(1)">1️⃣ 非常不符合</button>
            <button class="opt-btn" onclick="answer(2)">2️⃣ 不太符合</button>
            <button class="opt-btn" onclick="answer(3)">3️⃣ 比较符合</button>
            <button class="opt-btn" onclick="answer(4)">4️⃣ 非常符合</button>
        </div>
        <p style="color: #94a3b8; font-size: 13px; margin-top: 15px;">当前进度: <span id="progress-num">0</span> / 50</p>
    </div>
    
    <!-- 结果页 -->
    <div id="result-section" class="hidden">
        <div class="result-icon" id="res-icon">🐾</div>
        <div class="result-name" id="res-name">-</div>
        <div class="result-box" id="res-desc">-</div>
        <!-- 饼状图容器 -->
        <div class="chart-box"><canvas id="resultChart"></canvas></div>
        <button class="opt-btn" style="width:100%; background:#6366f1; color:white; border:none; margin-top:15px;" onclick="restart()">重新测评</button>
    </div>
</div>

<script>
    // 50道题库：精细化分配4个倾向类型
    const questions = [
        // 社交风格 (Dog / Cat)
        { q: "我在多人聚会中会感到能量充沛。", type: "dog" },
        { q: "社交后我需要独自待着才能“回血”。", type: "cat" },
        { q: "我喜欢成为人群中的焦点。", type: "dog" },
        { q: "面对陌生人我容易感到局促。", type: "cat" },
        { q: "我经常主动发起聚会邀请。", type: "dog" },
        { q: "一个人待着时我的效率最高。", type: "cat" },
        { q: "我很难拒绝别人的社交邀约。", type: "dog" },
        { q: "我更喜欢一对一深谈而非群体闲聊。", type: "cat" },
        { q: "我在群聊中总是最活跃的那一个。", type: "dog" },
        { q: "在社交场合我倾向于做个潜水观察者。", type: "cat" },
        // 思维决策 (Fox / Capybara)
        { q: "遇到问题我习惯先分析底层逻辑。", type: "fox" },
        { q: "对于大部分小事，我习惯顺其自然。", type: "capybara" },
        { q: "我喜欢规划未来，把一切掌握在手中。", type: "fox" },
        { q: "我奉行“船到桥头自然直”的哲学。", type: "capybara" },
        { q: "我习惯通过对比数据来做出最省力的决策。", type: "fox" },
        { q: "即便遇到突发变故，我也能保持心态平稳。", type: "capybara" },
        { q: "我追求生活中的效率与精确。", type: "fox" },
        { q: "我很难被外界的混乱所干扰情绪。", type: "capybara" },
        { q: "做事情前我一定要先评估风险。", type: "fox" },
        { q: "我觉得焦虑并不能解决任何实际问题。", type: "capybara" },
        // 抗压模式
        { q: "感到压力时，我倾向于找人倾诉。", type: "dog" },
        { q: "压力大时，我只想关上门与世隔绝。", type: "cat" },
        { q: "我喜欢通过团队协作来缓解压力。", type: "dog" },
        { q: "我更倾向于通过独处来自我消化负面情绪。", type: "cat" },
        { q: "面对困难，我倾向于寻求外界帮助。", type: "dog" },
        { q: "即便压力山大，我也不想暴露自己的脆弱。", type: "cat" },
        { q: "得到他人的鼓励会让我立刻好转。", type: "dog" },
        { q: "我习惯在深夜冷静地复盘痛苦原因。", type: "cat" },
        { q: "我害怕被孤立，这会增加我的压力。", type: "dog" },
        { q: "我认为解决压力最好的办法是保持距离。", type: "cat" },
        // 生活美学
        { q: "我非常在意个人空间的整洁与布置。", type: "fox" },
        { q: "只要足够舒服，房间乱一点也无所谓。", type: "capybara" },
        { q: "我喜欢收集并研究高质量的物品。", type: "fox" },
        { q: "对于生活用品，我倾向于极简主义。", type: "capybara" },
        { q: "我乐于追求高品质的生活仪式感。", type: "fox" },
        { q: "我的生活节奏比较慢，不喜欢被催促。", type: "capybara" },
        { q: "我对自己穿着打扮有很高的审美要求。", type: "fox" },
        { q: "我不太在意他人的评价，只求舒适。", type: "capybara" },
        { q: "我喜欢掌握最新趋势和潮流信息。", type: "fox" },
        { q: "我更愿意把时间花在发呆或睡眠上。", type: "capybara" },
        // 社交博弈
        { q: "在合作中，我倾向于隐藏部分底牌。", type: "fox" },
        { q: "在合作中，我更愿意坦诚相待。", type: "dog" },
        { q: "我擅长利用规则来达成目的。", type: "fox" },
        { q: "我相信真诚是解决问题的最好方式。", type: "dog" },
        { q: "我会预判对方可能提出的反对意见。", type: "fox" },
        { q: "我经常愿意为了团队利益妥协自己。", type: "dog" },
        { q: "我认为社会就是一场博弈，必须聪明应战。", type: "fox" },
        { q: "我喜欢那种互助共赢的团队氛围。", type: "dog" },
        { q: "我会根据对方的性格调整我的沟通方式。", type: "fox" },
        { q: "即使被利用，我也选择继续相信他人。", type: "dog" }
    ];

    // 完整的16种动物人格诊断书（按照第一、第二高分组合）
    const animalMap = {
        "dog_dog": { icon: "🐶", name: "萨摩耶犬", desc: "【极度社交派 · 纯血】纯粹的快乐制造机。你的社交能量彻底拉满，内心阳光且毫无阴霾，习惯用真诚击碎一切伪装，是人类世界的永动机。" },
        "dog_fox": { icon: "🐶", name: "边境牧羊犬", desc: "【极度社交派 · 混血】高智商社交王，掌控全局。你外表热情好客，实则双商在线，能在轻松的社交中悄悄引导局面，是极具魅力的破局者。" },
        "dog_capybara": { icon: "🦮", name: "金毛寻回犬", desc: "【极度社交派 · 混血】治愈系社交，永远的温和派。你不争不抢，对身边人的情绪极度包容，散发着让人卸下防备的暖光，是非常让人依赖的陪伴者。" },
        "dog_cat": { icon: "🐺", name: "哈士奇", desc: "【极度社交派 · 反差】社交悍匪，但又喜欢偶尔抽离。你在人群中是个戏剧张力十足的活宝，但在热闹的顶峰，你内心却会突然闪过一丝高冷的抽离感。" },
        
        "cat_cat": { icon: "🐈‍⬛", name: "黑猫", desc: "【高冷独立派 · 纯血】优雅、深邃、不可侵犯。你拥有完美的心理边界线，绝对不依附、不讨好。独处是你的王座，你的灵魂是一座不向外扩建的孤岛。" },
        "cat_fox": { icon: "🐱", name: "波斯猫", desc: "【高冷独立派 · 混血】精致且洞察力极强，审美巅峰。你习惯在角落冷眼旁观，极具艺术触觉。对粗糙的人和事保持本能的嫌弃，活得高贵有态度。" },
        "cat_dog": { icon: "🐅", name: "狸花猫", desc: "【高冷独立派 · 反差】傲娇天花板。在不熟的人面前是极冷、生人勿近的冰山；但在极少数被你认可的熟人面前，你话多且极具保护欲。" },
        "cat_capybara": { icon: "🐆", name: "沙漠猫", desc: "【高冷独立派 · 混血】极简生活家，最稳的隐士。你既不想去迎合外界复杂的社交，也懒得为虚无的事物产生内耗，保持低能耗的自我精神自洽。" },

        "capybara_capybara": { icon: "🥔", name: "温泉水豚", desc: "【佛系躺平派 · 纯血】全宇宙最稳内核。你的情绪钝感力已经登峰造极，无论面对多大的危机，内心都是一片平静的死水。天塌下来，你也能先睡一觉。" },
        "capybara_cat": { icon: "🐨", name: "考拉", desc: "【佛系躺平派 · 混血】极致慵懒的思考者。你既不需要社交的热闹，也不喜欢繁琐的规则。脑子里每天都在进行极简的哲学思考——今天怎么能更舒服地躺平。" },
        "capybara_dog": { icon: "🐼", name: "大熊猫", desc: "【佛系躺平派 · 混血】憨厚且受欢迎，没有脾气的团宠。随和、安稳、毫无攻击性是你的社交通行证，什么都可以，大家开心就好，治愈感满满。" },
        "capybara_fox": { icon: "🦥", name: "树懒", desc: "【佛系躺平派 · 反差】外表极其慢节奏、人畜无害，其实内心装满了各种对周围局势的暗中谋划与精确评估，是以慢打快的隐藏高手。" },

        "fox_fox": { icon: "🦊", name: "银狐", desc: "【高能谋略派 · 纯血】顶级布局者。你习惯将生活、职场视作严密的博弈棋局，擅长精准评估风险与收益，用最少的力气换取最完美的控制权。" },
        "fox_cat": { icon: "🦦", name: "雪貂", desc: "【高能谋略派 · 混血】敏锐的刺客，追求极致效率。你不显山露水，但执行力恐怖。对于认准的目标能做到静悄悄地一击必杀，极度讨厌无效沟通。" },
        "fox_dog": { icon: "🐬", name: "海豚", desc: "【高能谋略派 · 混血】在职场和社交场游刃有余的操盘手。智商与情商的双重天花板，能轻易看穿环境风向，并用极其得体的方式实现自我目的。" },
        "fox_capybara": { icon: "🦉", name: "猫头鹰", desc: "【高能谋略派 · 混血】拥有上帝视角的观察者，冷静到可怕。你既有狐狸的逻辑推演力，又有水豚那泰山崩于前而不动色的稳健内核，大智若愚。" }
    };

    let state = JSON.parse(localStorage.getItem('animal_16_state')) || {
        idx: 0, scores: { cat: 0, dog: 0, fox: 0, capybara: 0 }
    };

    function renderPage() {
        if (state.idx >= questions.length) { showResult(); return; }
        document.getElementById('progress-bar').style.width = `${(state.idx / questions.length) * 100}%`;
        document.getElementById('progress-num').innerText = state.idx;
        document.getElementById('q-text').innerText = `${state.idx + 1}. ${questions[state.idx].q}`;
    }

    function answer(score) {
        state.scores[questions[state.idx].type] += score;
        state.idx++;
        localStorage.setItem('animal_16_state', JSON.stringify(state));
        renderPage();
    }

    function showResult() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');

        // 计算一、二名得分属性
        let sorted = Object.keys(state.scores).sort((a, b) => state.scores[b] - state.scores[a]);
        let primary = sorted[0];
        let secondary = (state.scores[primary] - state.scores[sorted[1]] < 3) ? sorted[1] : primary;
        
        let matchKey = `${primary}_${secondary}`;
        let result = animalMap[matchKey] || animalMap[`${primary}_${primary}`];

        document.getElementById('res-icon').innerText = result.icon;
        document.getElementById('res-name').innerText = result.name + "塑";
        document.getElementById('res-desc').innerHTML = result.desc;

        // 绘制各成分比例饼状图
        const ctx = document.getElementById('resultChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['猫系因子', '犬系因子', '狐系因子', '水豚因子'],
                datasets: [{
                    data: [state.scores.cat, state.scores.dog, state.scores.fox, state.scores.capybara],
                    backgroundColor: ['#fda4af', '#93c5fd', '#fde047', '#86efac']
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function restart() {
        localStorage.removeItem('animal_16_state');
        state = { idx: 0, scores: { cat: 0, dog: 0, fox: 0, capybara: 0 } };
        location.reload();
    }

    renderPage();
</script>
</body>
</html>
